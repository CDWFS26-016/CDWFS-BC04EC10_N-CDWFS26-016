# Configuration SonarQube / SonarScanner pour my_distance
sonar.projectKey=my_distance
sonar.projectName=my_distance
sonar.projectVersion=1.0

# Code applicatif vs tests
sonar.sources=my_distance
sonar.tests=tests
sonar.exclusions=**/.venv/**,**/__pycache__/**

# Langage
sonar.python.version=3.13

# Couverture (rapport produit par pytest-cov : voir README)
sonar.python.coverage.reportPaths=coverage.xml

# Rapport de securite Bandit (SAST), format generic issue
sonar.python.bandit.reportPaths=bandit-report.json
